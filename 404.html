<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Manuel Acero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100svh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #F5F4F0; color: #111;
            font-family: 'DM Sans', sans-serif;
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(64px, 15vw, 180px);
            line-height: 0.9;
            letter-spacing: -0.04em;
            margin-bottom: 24px;
        }
        p {
            font-size: 17px; color: #555;
            line-height: 1.6; max-width: 380px;
            margin-bottom: 36px;
        }
        a {
            font-size: 13px; font-weight: 500;
            color: #F5F4F0; background: #111;
            padding: 14px 28px; border-radius: 100px;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
        }
        a:hover { background: #333; transform: translateY(-2px); }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>This page doesn't exist. Maybe it was moved, or maybe it never was.</p>
